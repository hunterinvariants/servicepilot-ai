services:
  web:
    build: .
    env_file: .env
    ports: ["127.0.0.1:${SERVICEPILOT_HOST_PORT:-8001}:8000"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped
  worker:
    build: .
    command: rq worker servicepilot --url redis://redis:6379/0
    env_file: .env
    depends_on: [db, redis]
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: servicepilot
      POSTGRES_USER: servicepilot
      POSTGRES_PASSWORD: servicepilot
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U servicepilot"], interval: 5s, timeout: 3s, retries: 10}
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis_data:/data"]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10}
volumes:
  postgres_data:
  redis_data:

