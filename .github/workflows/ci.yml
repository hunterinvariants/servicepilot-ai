name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - run: python -m ruff check app tests scripts alembic
      - run: python -m compileall -q app tests scripts alembic
      - name: Verify migrations
        env:
          DATABASE_URL: sqlite:///./migration-test.db
        run: python -m alembic upgrade head
      - run: python -m pytest --cov=app --cov-report=term-missing
      - run: docker build -t servicepilot-ai:test .

